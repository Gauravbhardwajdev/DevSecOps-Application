name: Enterprise DevSecOps CICD Pipeline

on:
  push:
    branches:
      - qa
    paths:
      - 'client/**'
      - 'server/**'
      - 'Dockerfile'                   
      - '.github/workflows/qa-cicd.yml'    
permissions:
  contents: write
  id-token: write

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code 0
        
      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn
  
  chekov-terraform:
    name: Checkov Terraform Scan 
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov Terraform Scan
        run: |
          checkov -d . \
            --framework terraform \
            --output json > checkov-terraform-report.json || true
      - name: Upload Checkov Terraform Report      
        uses: actions/upload-artifact@v4
        with: 
          name: checkov-terraform-report
          path: checkov-terraform-report.json
          if-no-files-found: warn

  chekov-k8:
    name: Checkov Kubernetes Scan 
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov Kubernetes Scan
        run: |
          checkov -d . \
            --framework kubernetes \
            --output json > checkov-k8-report.json || true
      - name: Upload Checkov Kubernetes Report      
        uses: actions/upload-artifact@v4
        with: 
          name: checkov-k8-report
          path: checkov-k8-report.json
          if-no-files-found: warn
          
  chekov-docker:
    name: Checkov Docker Scan 
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov Docker Scan
        run: |
          checkov -d . \
            --framework docker \
            --output json > checkov-docker-report.json || true
      - name: Upload Checkov docker Report      
        uses: actions/upload-artifact@v4
        with: 
          name: checkov-docker-report
          path: checkov-docker-report.json
          if-no-files-found: warn
          
  client-trivy-fs:
    name: Client Trivy FS Scan 
    runs-on: ubuntu-latest
    needs: gitleaks-scan 
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true
      - name: Verify Trivy Installation
        run: |
          trivy --version
          which trivy
      - name: Run Trivy FS Scan on Client (JSON)   
        run: |
          trivy fs ./client \
            --format json \
            --output client-trivy-fs-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0
            
      - name: Run Trivy FS Scan on Client (TABLE)   
        run: |
          trivy fs ./client \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > client-trivy-fs-report.txt
    
      - name: Upload Client Trivy JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: client-trivy-fs-json-report
          path: client-trivy-fs-report.json
          if-no-files-found: warn
            
      - name: Upload Client Trivy TABLE Report
        uses: actions/upload-artifact@v4
        with:
          name: client-trivy-fs-table-report
          path: client-trivy-fs-report.txt
          if-no-files-found: warn

  server-trivy-fs:
    name: Server Trivy FS Scan 
    runs-on: ubuntu-latest
    needs: gitleaks-scan 
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true
      - name: Verify Trivy Installation
        run: |
          trivy --version
          which trivy
      - name: Run Trivy FS Scan on Server (JSON)   
        run: |
          trivy fs ./server \
            --format json \
            --output server-trivy-fs-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0
            
      - name: Run Trivy FS Scan on Server (TABLE)   
        run: |
          trivy fs ./server \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > server-trivy-fs-report.txt
    
      - name: Upload Server Trivy JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: server-trivy-fs-json-report
          path: server-trivy-fs-report.json
          if-no-files-found: warn
            
      - name: Upload Server Trivy TABLE Report
        uses: actions/upload-artifact@v4
        with:
          name: server-trivy-fs-table-report
          path: server-trivy-fs-report.txt
          if-no-files-found: warn
  
  client-lint:  
    name: Client Lint
    runs-on: ubuntu-latest
    needs:
      - client-trivy-fs
      - chekov-k8
      - chekov-docker
      - chekov-terraform
    defaults: 
      run: 
        working-directory: client
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: npm ci

      - name: Run Client Lint
        run: npm run lint --if-present
        continue-on-error: true

  server-lint:  
    name: Server Lint
    runs-on: ubuntu-latest
    needs:
      - server-trivy-fs
      - chekov-k8s
      - chekov-docker
      - chekov-terraform
    defaults: 
      run: 
        working-directory: server
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        run: npm ci

      - name: Run Server Lint
        run: npm run lint --if-present
        continue-on-error: true
        
  server-test:  
    name: Server Test
    runs-on: ubuntu-latest
    needs: server-lint
    defaults: 
      run: 
        working-directory: server
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install Server Dependencies
        run: npm ci
        
      - name: Run Server Tests
        run: npm test --if-present
        continue-on-error: true

  client-test:  
    name: client Test
    runs-on: ubuntu-latest
    needs: client-lint
    defaults: 
      run: 
        working-directory: client
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install Server Dependencies
        run: npm ci
        
      - name: Run client Tests
        run: npm test --if-present
        continue-on-error: true
        
  sonarqube:
    name: Sonarqube Analysis & Quality Check
    runs-on: ubuntu-latest
    needs: 
      - server-test
      - client-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        continue-on-error: true
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          
      - name: "Example show SonarQube Quality Gate Status value"
        run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"

  client-build:
    name: Client-Build
    runs-on: ubuntu-latest
    needs: client-test
    defaults:
      run: 
        working-directory: client
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: npm ci
        
      - name: Build Client
        run: npm run build --if-present
  
  docker:
    name: Docker Build, Scan, and Push
    needs: 
      - client-build
      - sonarqube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
     
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
       
      - name: Build and Load Image Locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true 
          no-cache: true
          tags: |
            gauravbhardwajb96/nodejs-app:${{ github.sha }}
            gauravbhardwajb96/nodejs-app:latest

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          
      - name: Run Trivy Image Scan (JSON)   
        run: |
          trivy image --format json --output image-trivy-report.json --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 gauravbhardwajb96/nodejs-app:${{ github.sha }}
            
      - name: Run Trivy Image Scan (TABLE)   
        run: |
          trivy image --format table --output image-trivy-report.txt --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 gauravbhardwajb96/nodejs-app:${{ github.sha }}

      - name: Upload Trivy Image JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: Image-trivy-json-report
          path: image-trivy-report.json
          if-no-files-found: warn
            
      - name: Upload Trivy Image TABLE Report
        uses: actions/upload-artifact@v4
        with:
          name: Image-trivy-table-report
          path: image-trivy-report.txt
          if-no-files-found: warn
          
      - name: Generate Source SBOM
        uses: anchore/sbom-action@v0.18.0
        with:
          path: .
          format: spdx-json
          output-file: source-sbom.spdx.json
          upload-artifact: true
          
      - name: Generate image SBOM
        uses: anchore/sbom-action@v0.18.0
        with:
          image: gauravbhardwajb96/nodejs-app:${{ github.sha }}
          format: spdx-json
          output-file: image-sbom.spdx.json
          upload-artifact: true
          
      - name: Push Image to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            gauravbhardwajb96/nodejs-app:${{ github.sha }}
            gauravbhardwajb96/nodejs-app:latest
            
  update-qa-manifest:
    name: Update QA Manifest
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: gauravbhardwaj96/nodejs-app:.*|image: gauravbhardwaj96/nodejs-app:${{ github.sha }}|g" k8s-manifests/qa/app-deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/qa/app-deployment.yaml
          git commit -m "Update QA image to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin qa
          
      - name: Show updated manifest (debug)
        run: |
          cat k8-manifests/qa/app-deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/qa/app-deployment.yaml
          git commit -m "Update QA image to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin qa

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: update-qa-manifest
    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: my-cluster
      K8S_NAMESPACE: qa

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: qa  # Explicitly pull the latest QA branch tracking manifest adjustments

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${{ env.EKS_CLUSTER_NAME }}"

      - name: Verify identity
        run: |
          aws sts get-caller-identity
          kubectl config current-context

      - name: Verify namespace access
        run: |
          kubectl get pods -n "${{ env.K8S_NAMESPACE }}"
          kubectl get services -n "${{ env.K8S_NAMESPACE }}"
          kubectl auth can-i create deployments -n "${{ env.K8S_NAMESPACE }}"
          kubectl auth can-i create services -n "${{ env.K8S_NAMESPACE }}"
          kubectl auth can-i create ingresses.networking.k8s.io -n "${{ env.K8S_NAMESPACE }}"

      - name: Deploy manifests
        run: |
          kubectl apply -f k8-manifests/qa/ -n "${{ env.K8S_NAMESPACE }}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/nodejs-app -n "${{ env.K8S_NAMESPACE }}" --tim









          
  
