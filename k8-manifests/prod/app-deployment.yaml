apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: prod  # Updated from 'qa' to 'prod'
  labels:
    app: nodejs-app
spec:
  replicas: 2  # Recommended: Increased to 2 for production availability
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: nodejs-app
          # Keep this placeholder; your CI/CD pipeline will overwrite this specific tag
          image: gauravbhardwajb96/nodejs-app:latest 
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: mysql-prod  # Ensure this points to your production service
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE            
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: DATABASE_URL
              value: "mysql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):3306/$(DB_NAME)"
